global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: collector-ingest
    static_configs:
      - targets:
          - collector-ingest:9464

  - job_name: collector-writer
    static_configs:
      - targets:
          - collector-writer:9465

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
